worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    upstream backend {
        server backend:8000;
    }

    upstream vitrine {
        server vitrine:8001;
    }

    # ── Vitrine (domaine principal) ──────────────────────────────────────────
    server {
        listen 80;
        server_name babifix.ci www.babifix.ci;

        client_max_body_size 20M;

        location /static/vitrine/ {
            alias /srv/static/vitrine/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://vitrine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Backend API + Admin Panel ────────────────────────────────────────────
    server {
        listen 80;
        server_name api.babifix.ci admin.babifix.ci;

        client_max_body_size 20M;

        location /static/ {
            alias /srv/static/backend/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /srv/media/;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
