name: CI/CD — BABIFIX

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.27.0"
  PYTHON_VERSION: "3.12"

jobs:
  # ─── Django Backend Tests ──────────────────────────────────────────────────
  django-backend:
    name: Django Backend — Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: babifix_admin_django

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: babifix_test
          POSTGRES_USER: babifix
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: babifix_admin_django/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        env:
          DATABASE_URL: postgres://babifix:testpass@localhost:5432/babifix_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "False"
          DJANGO_SETTINGS_MODULE: config.settings
        run: python manage.py test --verbosity=2

  # ─── Django Vitrine Tests ──────────────────────────────────────────────────
  django-vitrine:
    name: Django Vitrine — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: babifix_vitrine_django

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: babifix_vitrine_django/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Vitrine tests
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "False"
          DJANGO_SETTINGS_MODULE: config.settings
        run: python manage.py test --verbosity=2

  # ─── Flutter Client — Analyze + Test ──────────────────────────────────────
  flutter-client:
    name: Flutter Client — Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: babifix_client_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings

      - name: Run tests
        run: flutter test --coverage || true

  # ─── Flutter Prestataire — Analyze + Test ────────────────────────────────
  flutter-prestataire:
    name: Flutter Prestataire — Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: babifix_prestataire_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings

      - name: Run tests
        run: flutter test --coverage || true

  # ─── Build APK (client) — only on tag push ────────────────────────────────
  build-apk-client:
    name: Build APK — Client (release tag)
    runs-on: ubuntu-latest
    needs: [flutter-client, django-backend]
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: babifix_client_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info \
            --dart-define=BABIFIX_API_BASE=${{ secrets.BABIFIX_API_BASE }} \
            --dart-define=BABIFIX_WS_BASE=${{ secrets.BABIFIX_WS_BASE }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: babifix-client-${{ github.ref_name }}.apk
          path: babifix_client_flutter/build/app/outputs/flutter-apk/app-release.apk

  # ─── Build APK (prestataire) — only on tag push ───────────────────────────
  build-apk-prestataire:
    name: Build APK — Prestataire (release tag)
    runs-on: ubuntu-latest
    needs: [flutter-prestataire, django-backend]
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: babifix_prestataire_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info \
            --dart-define=BABIFIX_API_BASE=${{ secrets.BABIFIX_API_BASE }} \
            --dart-define=BABIFIX_WS_BASE=${{ secrets.BABIFIX_WS_BASE }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: babifix-prestataire-${{ github.ref_name }}.apk
          path: babifix_prestataire_flutter/build/app/outputs/flutter-apk/app-release.apk
