version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-babifix}
      POSTGRES_USER: ${POSTGRES_USER:-babifix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-babifix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend Django (API REST + Channels + Admin Panel) ────────────────────
  backend:
    build:
      context: ./babifix_admin_django
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./babifix_admin_django/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-babifix}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-babifix}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    expose:
      - "8000"

  # ─── Vitrine Django ────────────────────────────────────────────────────────
  vitrine:
    build:
      context: ./babifix_vitrine_django
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./babifix_vitrine_django/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-babifix}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-babifix}
      BABIFIX_ADMIN_API_BASE: http://backend:8000
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - vitrine_static:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 2"
    expose:
      - "8001"

  # ─── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/srv/static/backend:ro
      - backend_media:/srv/media:ro
      - vitrine_static:/srv/static/vitrine:ro
      - nginx_certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - vitrine

volumes:
  postgres_data:
  redis_data:
  backend_media:
  backend_static:
  vitrine_static:
  nginx_certs:
